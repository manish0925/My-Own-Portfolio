{% extends "base.html" %}

{% block content %}
<section class="section-head">
    <h2>Reset Password</h2>
    <p>Choose a new password for your admin account.</p>
</section>

<div class="form-panel">
    {% if error %}
    <div class="alert">{{ error }}</div>
    {% endif %}
    {% if token %}
    <form method="POST" class="contact-form">
        <label for="new_password">New Password</label>
        <input id="new_password" type="password" name="new_password" placeholder="New password">
        <label for="confirm_password">Confirm Password</label>
        <input id="confirm_password" type="password" name="confirm_password" placeholder="Confirm password">
        <button type="submit">Reset Password</button>
    </form>
    {% else %}
    <p>Please request a new password reset link.</p>
    <p><a href="{{ url_for('forgot_password') }}">Send reset link again</a></p>
    {% endif %}
</div>
{% endblock %}
